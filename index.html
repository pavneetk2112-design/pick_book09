<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .book {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .book h3 {
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>📚 My Book Library</h1>
    <p>Explore your favorite books</p>
</header>

<div class="container">
    <div class="book">
        <h3>The Great Gatsby</h3>
        <p>Author: F. Scott Fitzgerald</p>
    </div>

    <div class="book">
        <h3>1984</h3>
        <p>Author: George Orwell</p>
    </div>

    <div class="book">
        <h3>To Kill a Mockingbird</h3>
        <p>Author: Harper Lee</p>
    </div>
</div>

<footer>
    <p>© 2026 Book Library</p>
</footer>

<!-- Watson Assistant Chat Integration -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "19bed05a-408a-4cf4-96ce-d7f628c86e8c",
    region: "eu-de",
    serviceInstanceID: "2c90c288-4b73-4e39-8297-ad10bc4253c4",
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + 
           (window.watsonAssistantChatOptions.clientVersion || 'latest') + 
           "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
